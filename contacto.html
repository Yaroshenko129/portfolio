<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contacto</title>

<link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #050505, #000);
    color: #ff2c2c;
    font-family: 'Creepster', cursive;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

/* ТЕКСТ */
.email {
    font-size: 40px;
    text-shadow: 0 0 10px red, 0 0 30px darkred;
    margin-bottom: 40px;
}

/* WhatsApp кнопка */
.whatsapp {
    width: 80px;
    cursor: pointer;
    transition: 0.3s;
    filter: drop-shadow(0 0 10px red);
}

.whatsapp:hover {
    transform: scale(1.2);
}

/* НАЗАД */
.back {
    margin-top: 50px;
    padding: 10px 30px;
    font-size: 25px;
    font-family: 'Creepster', cursive;
    color: red;
    background: black;
    border: 2px solid red;
    cursor: pointer;
    box-shadow: 0 0 10px red;
}

.back:hover {
    transform: scale(1.1);
}
</style>

</head>
<body>

<div class="email">yarogleb2@gmail.com</div>

<!-- WhatsApp -->
<img 
class="whatsapp"
src="https://cdn-icons-png.flaticon.com/512/733/733585.png"
onclick="goWhatsApp()"
/>

<button class="back" onclick="goBack()">BACK</button>

<script>
function goWhatsApp() {
    window.location.href = "https://whatsapp.com/dl/";
}

function goBack() {
    window.location.href = "menu.html";
}
</script>

</body>
</html>
