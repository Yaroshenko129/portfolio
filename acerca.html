<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Acerca de mi</title>

<link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #050505, #000);
    color: #ff2c2c;
    font-family: 'Creepster', cursive;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* ТЕКСТ */
.text {
    font-size: 45px;
    text-align: center;
    max-width: 600px;
    text-shadow: 
        0 0 10px red,
        0 0 30px darkred,
        0 0 60px crimson;

    animation: flicker 2s infinite;
}

/* мерцание */
@keyframes flicker {
    0% { opacity: 1; }
    50% { opacity: 0.6; }
    100% { opacity: 1; }
}

/* КНОПКА НАЗАД */
.back {
    margin-top: 60px;
    padding: 15px 40px;
    font-size: 28px;
    font-family: 'Creepster', cursive;
    color: #ff2c2c;
    background: black;
    border: 2px solid red;
    cursor: pointer;

    box-shadow: 0 0 15px red, 0 0 40px darkred;
    transition: 0.3s;
}

.back:hover {
    transform: scale(1.1);
    background: #220000;
    box-shadow: 0 0 30px red, 0 0 80px crimson;
}
</style>

</head>
<body>

<div class="text">
    Bienvenido, creo sitios web para tu negocio
</div>

<button class="back" onclick="goBack()">BACK</button>

<script>
function goBack() {
    window.location.href = "menu.html";
}
</script>

</body>
</html>
